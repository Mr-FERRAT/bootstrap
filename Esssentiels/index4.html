<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les cards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/fontawesome.min.css">
    <link rel="stylesheet" href="css/brands.min.css">
</head>
<body>
    
    <H3>Les cards</H3>

    <div class="container g-5">
        <h1>les cartes</h1>
        <div class="card mb-5">
            <h3>Ceci est ma premier card</h3>
        </div>
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <img src="resources/keegan-houser--Q_t4SCN8c4-unsplash.jpg" class="card-img-top" alt="">
                    <div class="card-header">Mes voyages</div>
                    <div class="card-body">
                        <h3 class="card-title">Mes voyages</h3>
                        <p class="card-text">Résumé des mes voyages et de mes explorations</p>
                        <ul class="list-group list-group-flush">
                            <li>Costa rica</li>
                            <li>Mongolie</li>
                            <li>thailande</li>
                            <li>Australie</li>
                        </ul>
                    </div>
                    <div class="card-footer"><a href="#">En savoir plus</a></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>  
</body>
</html>
