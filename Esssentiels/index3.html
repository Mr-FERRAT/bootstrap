<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les formulaires dans bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/fontawesome.min.css">
    <link rel="stylesheet" href="css/brands.min.css">
</head>
<body>

    <div class="container">
        <h3>Les formulaires dans bootstrap</h3>
        <form action="" id="my-form">
            <div>
                <label for="email" class="form-label">Adresse mail</label>
                <input type="email" id="email" aria-describedby="help" class="form-control">
                <div id="help" class="form-text text-warning">Nous ne partagerons jamais votre adresse mail.</div>
            </div>
            <div>
                <label for="password" class="form-label">Mot de passe</label>
                <input type="password" id="password" class="form-control">
            </div>
            <button type="submit">Envoyer</button>
        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
