<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Essentiels</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    
    <h1>Les boutons</h1>
    <h3>Boutons de base</h3>
    <button class="btn" onclick="clickSimple()">Mon premier bouton</button>

    <h3>Les différent boutons</h3>
    <div class="container m-5 rounded shadow">
        <div class="row g-3 text-center">
            <div class="col-3 col-6">
                <button class="btn btn-primary">Bouton primary</button>
            </div>
            <div class="col-3 col-6">
                <button class="btn btn-success">Bouton success</button>
            </div>
            <div class="col-3 col-6">
                <button class="btn btn-info">Bouton info</button>
            </div>
            <div class="col-3 col-6">
                <button class="btn btn-danger">Bouton danger</button>
            </div>
            <div class="col-3 col-6">
                <button class="btn btn-light">Bouton light</button>
            </div>
            <div class="col-3 col-6">
                <button class="btn btn-dark">Bouton dark</button>
            </div>
            <div class="col-3 col-6">
                <button class="btn btn-link">Bouton link</button>
            </div>
            <div class="col-3 col-6">
                <button class="btn btn-warning">Bouton warning</button>
            </div>
            <div class="col-3 col-6">
                <button class="btn btn-secondary">Bouton secondary</button>
            </div>
        </div>
    </div>

    <h3>Les tailles de boutons</h3>
    <div class="row">
        <div class="col-4">
            <button class="btn btn-primary btn-sm">Bouton small</button>
        </div>
        <div class="col-6">
            <div class="btn btn-success btn-lg">Bouton large</div>
        </div>
    </div>

    <div class="row">
        <div class="col-6">
            <button class="btn btn-secondary" onclick="activateBtn()">Activer</button>
        </div>
        <div class="col-6">
            <button class="btn btn-success disabled" id="disabled">Je ne suis pas actif</button>
        </div>
    </div>
    <button class="btn btn-danger">
        <i class="fa-solid fa-face-smile"></i>
    </button>

    <div class="container">
        <div class="btn-group-vertical" role="group">
            <button class="btn btn-success">success</button>
            <button class="btn btn-warning">warning</button>
            <button class="btn btn-danger">danger</button>
        </div>
    </div>
    
    <div class="container">
        <div class="pt-4" role="group">
            <button class="btn btn-success">success</button>
            <button class="btn btn-warning">warning</button>
            <button class="btn btn-danger">danger</button>
        </div>
    </div>

    <h3>Dropdown</h3>

    <div class="row">
        <div class="col-3">
    
            <button class="btn btn-light dropdown-toggle" data-bs-toggle="dropdown">Dropdown</button>
                <ul class="dropdown-menu">
                    <li class="dropdown-item">Item 1</li>
                    <li class="dropdown-item">Item 2</li>
                    <li class="dropdown-item">Item 3</li>
                </ul>
        </div>
        <div class="col-9">
            <div class="btn-group">
                 <button class="btn btn-light dropdown-toggle" data-bs-toggle="dropdown">Dropdown</button>
            <ul class="dropdown-menu">
                <li class="dropdown-item">Item 1</li>
                <li class="dropdown-item">Item 2</li>
                <li class="dropdown-item">Item 3</li>
            </ul>
            </div>
        </div>
    </div>
    
    
    
    
    
    
    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
