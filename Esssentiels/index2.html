    <title>Les tableaux avec bootstrap</title>

<body>
    
    <h3>Les tableaux dans bootstrap</h3>

    <table class="table table-bordered table-hover table-danger container">
        <head>
            <tr class="table-primary">
                <th class="table-warning">En-tete 1</th>
                <th>En-tete 2</th>
            </tr>
        </head>
        <tbody class="text-center">
            <tr class="table-active">
                <td class="align-top">Donnée 1</td>
                <td class="text-end">Donnée 2 que j'ai décidé d'aggrandir</td>
            </tr>
            <tr>
                <td class="table-cell-empty">Donnée 3</td>
                <td>Donnée 4</td>
            </tr>
        </tbody>
    </table>
