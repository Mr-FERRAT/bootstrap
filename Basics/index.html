<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les basique revisités par Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
</head>
<body>
    
    <section class="container">
        <h1>Les couleurs</h1>
        <ul >
            <li class="text-primary">Primaire</li>
            <li class="text-secondary">Secondaire</li>
            <li class="text-info">Info</li>
            <li class="text-success">Success</li>
            <li class="text-warning">Warning</li>
            <li class="text-danger">Danger</li>
            <li class="text-light bg-dark" style="width: fit-content;">Light</li>
            <li class="text-dark">Dark</li>
            <li class="text-white bg-dark" style="width:fit-content;">white</li>
        </ul>
        <div class="row">
            <div class="col-4 bg-primary">Primaire</div>
            <div class="col-4 bg-secondary">Secondaire</div>
            <div class="col-4 bg-info">Indo</div>
            <div class="col-4 bg-success">Success</div>
            <div class="col-4 bg-warning">warning</div>
            <div class="col-4 bg-danger">Danger</div>
            <div class="col-4 bg-light text-secondary">Light</div>
            <div class="col-4 bg-dark text-light">Dark</div>
            <div class="col-4 bg-white">white</div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</body>
</html>
