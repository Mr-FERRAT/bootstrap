<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les informations en bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <h1>Les éléments informatifs</h1>
    <!-- les badges -->
    <span class="badge bg-primary text-warning">Mon premier badge</span>
    <a href="" target="_blank" class="badge bg-danger text-decoration-none text-dark p-4p py-2s">lien</a>
    <div class="container m-5">
        <button class="btn btn-success position-relative">
            Notifications
            <span class="bg-danger rounded-pill p-1 position-absolute top-0 start-100 translate-middle" style="min-height: 32px; min-width: 32px;">9+</span>
        </button>
        <div>
            <ul class="list-group">
                <li class="list-item">Element 1</li>
                <li class="list-item">Element 2 br<span class="badge bg-info">Important</span></li>
                <li class="list-item">Element 3</li>
            </ul>
        </div>
    </div>
    <!-- les alertes -->

    <hr class="container px-5 py-3 mt-5">
    <div class="container">
        <h1>les alertes</h1>
        <div class="alert alert-danger">Ma première alerte</div>
        <div class="my-4 ">Ceci est une alerte avec lien <a href="#" class="alert alert-info">mon lien</a></div>
        <div class="alert alert-success my-5 alert-dismissible show fade">
            Alert dismissible
            <button type="button" class="btn-close" aria-label="close" data-bs-dismiss="alert"></button>
        </div>
    </div>

    <!-- Les pop overs -->

    <div class="container">
        <button class="btn btn-success col-6 offset-3" type="button" data-bs-toggle="popover" title="Titre de mon popover" data-bs-content="Contenu de mon popover" data-bs-placement="left" data-bs-trigger="hover">Afficher mon popover</button>
    </div>
    
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
     <script src="my-script.js">
        
     </script>
</body>
</html>
